name: Deploy viewer to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "viewer/**"
      - ".github/workflows/deploy-viewer.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: viewer/package-lock.json
      - run: npm ci
        working-directory: viewer
      - run: npm run build
        working-directory: viewer
        env:
          VITE_PMTILES_URL: https://shiworks2.xsrv.jp/npa-traffic-accident-data/honhyo_2019-2024_converted.pmtiles
      - uses: actions/upload-pages-artifact@v3
        with:
          path: viewer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
