<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>交通事故統計マップ 2019–2024 | 警察庁オープンデータ</title>
    <meta
      name="description"
      content="警察庁 交通事故統計オープンデータ（2019〜2024年）を地図で閲覧できるビューワ"
    />
    <!-- PWA -->
    <meta name="theme-color" content="#ffffff" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="default"
    />
    <meta name="apple-mobile-web-app-title" content="事故マップ" />
  </head>
  <body>
    <div id="map"></div>

    <button id="panel-toggle" type="button" aria-label="フィルタパネルを開閉">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
      </svg>
    </button>

    <aside id="panel">
      <header class="panel-header">
        <div>
          <h1>交通事故統計マップ</h1>
          <p class="panel-subtitle">警察庁オープンデータ 2019–2024</p>
        </div>
        <button id="panel-close" type="button" aria-label="閉じる">×</button>
      </header>

      <div class="panel-body">
        <section class="panel-section">
          <h2>事故内容</h2>
          <div class="chip-group" id="filter-naiyou">
            <button class="chip chip-fatal active" data-value="死亡事故" type="button">死亡事故</button>
            <button class="chip chip-injury active" data-value="負傷事故" type="button">負傷事故</button>
          </div>
        </section>

        <section class="panel-section">
          <h2>発生年</h2>
          <div class="chip-group" id="filter-year">
            <button class="chip active" data-value="2019" type="button">2019</button>
            <button class="chip active" data-value="2020" type="button">2020</button>
            <button class="chip active" data-value="2021" type="button">2021</button>
            <button class="chip active" data-value="2022" type="button">2022</button>
            <button class="chip active" data-value="2023" type="button">2023</button>
            <button class="chip active" data-value="2024" type="button">2024</button>
          </div>
        </section>

        <section class="panel-section">
          <h2>昼夜<span class="section-note">（昼＝日の出〜日の入り／夜＝日の入り〜日の出）</span></h2>
          <div class="chip-group" id="filter-tyuya">
            <button class="chip active" data-value="昼" type="button">☀ 昼</button>
            <button class="chip active" data-value="夜" type="button">☾ 夜</button>
          </div>
        </section>

        <section class="panel-section">
          <h2>関与当事者</h2>
          <select id="filter-party" class="panel-select">
            <option value="" selected>すべて</option>
            <option value="pedestrian">歩行者</option>
            <option value="bicycle">自転車</option>
            <option value="motorcycle">二輪車（自動二輪・原付）</option>
            <option value="kickboard">特定小型原付（電動キックボード等）</option>
            <option value="passenger">乗用車</option>
            <option value="cargo">貨物車</option>
          </select>
        </section>

        <section class="panel-section">
          <h2>年齢階層<span class="section-note">（当事者いずれかが該当）</span></h2>
          <select id="filter-age" class="panel-select">
            <option value="" selected>すべて</option>
            <option value="0～24歳">0～24歳</option>
            <option value="25～34歳">25～34歳</option>
            <option value="35～44歳">35～44歳</option>
            <option value="45～54歳">45～54歳</option>
            <option value="55～64歳">55～64歳</option>
            <option value="65～74歳">65～74歳</option>
            <option value="75歳以上">75歳以上</option>
            <option value="不明">不明</option>
          </select>
        </section>

        <section class="panel-section">
          <h2>表示モード</h2>
          <div class="segmented" id="display-mode">
            <button class="segment active" data-value="points" type="button">ポイント</button>
            <button class="segment" data-value="heatmap" type="button">ヒートマップ</button>
          </div>
        </section>

        <section class="panel-section">
          <h2>空中写真<span class="section-note">（ズーム14以上）</span></h2>
          <div class="slider-row">
            <input type="checkbox" id="photo-toggle" />
            <input type="range" id="photo-opacity" min="0" max="100" value="50" disabled />
            <span id="photo-opacity-value">50%</span>
          </div>
        </section>

        <div class="panel-stats" id="stats">&nbsp;</div>

        <footer class="panel-footer">
          出典: <a href="https://www.npa.go.jp/publications/statistics/koutsuu/opendata/index_opendata.html" target="_blank" rel="noopener">警察庁 交通事故統計情報のオープンデータ</a>を加工して作成
        </footer>
      </div>
    </aside>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
